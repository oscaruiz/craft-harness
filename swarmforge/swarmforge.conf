# six-pack — sequential domain pack (no tmux, no daemon). Driven by bin/run-six
# on the fork's main branch; this branch carries only the per-phase CONTENT.
#
# Format: phase <name> <agent> <role-prompt>
#   <name>        ordered phase identity; run-six owns each name's structure —
#                 specify pauses at the R6 gate and its @ID scenarios are
#                 snapshotted; code commits the scoped candidate on the enforced
#                 branch; harden's declared quality gates are enforced by the
#                 runner; qa runs in a clean worktree at the candidate and the
#                 runner then runs the declared acceptance command itself and
#                 requires every approved scenario to pass (executable Gherkin).
#                 run-six fails loudly if this list drifts from the sequence it
#                 knows (specify code harden qa).
#   <agent>       upstream <agent> token (adapters/CONTRACT.md Mode 1); the
#                 adapter is chosen with run-six --adapter. Recorded for provenance.
#   <role-prompt> swarmforge/roles/<role-prompt>.prompt — the phase body run-six
#                 seeds (it appends the injected TEST_CMD/ACCEPT_CMD/HANDOFF_PATH
#                 lines and the handoff-section instructions).
#
# Roles map to the upstream six-pack's specifier/coder/hardener/QA; the upstream
# 'hardender' spelling is normalized to 'hardener' here. Upstream cleaner is
# folded into harden and architect is enforced as a declared quality command
# (see docs/current-milestone.md).
phase specify claude specifier
phase code claude coder
phase harden claude hardener
phase qa claude QA
