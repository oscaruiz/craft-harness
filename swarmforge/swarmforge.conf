# solo-pack — sequential pack (no tmux, no daemon). Driven by bin/run-solo on
# the fork's main branch; this branch carries only the per-phase CONTENT.
#
# Format: phase <name> <agent> <role-prompt>
#   <name>        ordered phase identity; run-solo owns each name's structure
#                 (specify pauses at the R6 gate; code commits the candidate on
#                 the enforced branch; verify runs in a clean worktree at the
#                 candidate commit). run-solo fails loudly if this list drifts
#                 from the sequence it knows.
#   <agent>       upstream <agent> token (claude-code, adapters/CONTRACT.md
#                 Mode 1). The adapter is chosen with run-solo --adapter; this
#                 field records the pack's intended agent for provenance.
#   <role-prompt> swarmforge/roles/<role-prompt>.prompt — the phase body
#                 run-solo seeds (it appends the handoff-section instructions).
phase specify claude specify
phase code claude code
phase verify claude verify
