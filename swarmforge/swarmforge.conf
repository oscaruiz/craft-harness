# Format: window <role> <agent> <worktree> [task|batch] [extra-cli-args...]
# The optional receive mode defaults to task. Use batch for roles that should
# consume all currently queued equal-priority handoffs as one batch.
# Any fields after the receive mode are passed to the agent CLI, e.g. --yolo.
#
# two-pack-lite: claude-code in both roles (adapters/CONTRACT.md, Mode 2). The
# upstream launcher's <agent> token for Claude Code is `claude`; it builds
# `claude --append-system-prompt-file <role.prompt> --permission-mode
# acceptEdits ...`, which is the interactive-window shape the contract records.
window coder claude master
window cleaner claude cleaner batch
